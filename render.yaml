services:
  - type: web
    name: ppbears-cs-backend
    runtime: node
    rootDir: packages/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: HOST
        value: 0.0.0.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_UNLOCK_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WOO_BASE_URL
        sync: false
      - key: WOO_CONSUMER_KEY
        sync: false
      - key: WOO_CONSUMER_SECRET
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
